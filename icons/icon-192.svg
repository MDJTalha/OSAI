<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1652a8"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="24" fill="url(#bgGradient)"/>
  
  <!-- Ruler/Measure icon -->
  <g transform="translate(96, 96)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00d9ff" stroke-width="4" opacity="0.3"/>
    
    <!-- Measure tape -->
    <rect x="-40" y="-15" width="80" height="30" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Measurement marks -->
    <line x1="-30" y1="-15" x2="-30" y2="-5" stroke="#ffffff" stroke-width="2"/>
    <line x1="-20" y1="-15" x2="-20" y2="-8" stroke="#ffffff" stroke-width="2"/>
    <line x1="-10" y1="-15" x2="-10" y2="-5" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="-15" x2="0" y2="-8" stroke="#ffffff" stroke-width="2"/>
    <line x1="10" y1="-15" x2="10" y2="-5" stroke="#ffffff" stroke-width="2"/>
    <line x1="20" y1="-15" x2="20" y2="-8" stroke="#ffffff" stroke-width="2"/>
    <line x1="30" y1="-15" x2="30" y2="-5" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Arrow heads -->
    <path d="M -45 0 L -35 -5 L -35 5 Z" fill="#e94560"/>
    <path d="M 45 0 L 35 -5 L 35 5 Z" fill="#e94560"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#00d9ff"/>
  </g>
  
  <!-- Text -->
  <text x="96" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">MC</text>
</svg>
