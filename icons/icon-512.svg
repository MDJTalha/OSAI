<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1652a8"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGradient)"/>
  
  <!-- Ruler/Measure icon -->
  <g transform="translate(256, 256)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#00d9ff" stroke-width="8" opacity="0.3"/>
    
    <!-- Measure tape -->
    <rect x="-100" y="-40" width="200" height="80" rx="12" fill="none" stroke="#ffffff" stroke-width="6"/>
    
    <!-- Measurement marks -->
    <line x1="-80" y1="-40" x2="-80" y2="-15" stroke="#ffffff" stroke-width="5"/>
    <line x1="-55" y1="-40" x2="-55" y2="-20" stroke="#ffffff" stroke-width="5"/>
    <line x1="-30" y1="-40" x2="-30" y2="-15" stroke="#ffffff" stroke-width="5"/>
    <line x1="-5" y1="-40" x2="-5" y2="-20" stroke="#ffffff" stroke-width="5"/>
    <line x1="20" y1="-40" x2="20" y2="-15" stroke="#ffffff" stroke-width="5"/>
    <line x1="45" y1="-40" x2="45" y2="-20" stroke="#ffffff" stroke-width="5"/>
    <line x1="70" y1="-40" x2="70" y2="-15" stroke="#ffffff" stroke-width="5"/>
    
    <!-- Arrow heads -->
    <path d="M -110 0 L -85 -15 L -85 15 Z" fill="#e94560"/>
    <path d="M 110 0 L 85 -15 L 85 15 Z" fill="#e94560"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="16" fill="#00d9ff"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">MC</text>
</svg>
