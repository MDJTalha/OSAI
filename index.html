<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OSAI - AI Vision System">
    <title>OSAI - Enterprise AI Vision</title>
    
    <!-- AI Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    
    <style>
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background: #000; z-index: 1; }
        canvas { position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0A192F; color: #fff; overflow: hidden; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,25,47,0.95); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .stats { display: flex; gap: 20px; }
        .stat { font-size: 14px; }
        .stat strong { color: #3B82F6; }
        
        #startBtn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #3B82F6, #8B5CF6); color: white; border: none; border-radius: 16px; padding: 40px 80px; font-size: 28px; font-weight: bold; cursor: pointer; z-index: 9999; }
        #startBtn:active { transform: translate(-50%, -50%) scale(0.95); }
        
        .actions { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,25,47,0.95); padding: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; z-index: 1000; }
        .btn { background: #1F2937; color: #fff; border: 1px solid #374151; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; min-height: 48px; min-width: 48px; }
        .btn:hover { background: #3B82F6; }
        
        .status { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(59,130,246,0.9); padding: 8px 16px; border-radius: 8px; z-index: 9999; font-size: 13px; }
        
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #3B82F6; color: white; padding: 12px 24px; border-radius: 8px; z-index: 10000; }
        .toast.success { background: #10B981; }
        .toast.error { background: #EF4444; }
        
        #debug { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.95); color: #0F0; padding: 15px; border-radius: 8px; z-index: 9999; font-size: 12px; max-height: 40vh; overflow-y: auto; font-family: monospace; display: none; border: 2px solid #0F0; }
        #debug.show { display: block; }
        #toggleDebug { position: fixed; top: 10px; right: 10px; background: #EF4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; z-index: 10000; cursor: pointer; }
        
        .panel { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1F2937; border-radius: 12px; padding: 20px; min-width: 300px; max-width: 90vw; z-index: 9998; display: none; }
        .panel.show { display: block; }
        .panel-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .panel-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; }
            .stats { flex-wrap: wrap; justify-content: center; }
            .stat { min-width: calc(33% - 8px); font-size: 11px; }
            .actions { flex-direction: row; overflow-x: auto; }
            .btn { min-width: 70px; flex: 0 0 70px; font-size: 12px; }
            #startBtn { padding: 30px 60px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="stats">
            <div class="stat">Models: <strong id="aiModels">Loading...</strong></div>
            <div class="stat">Items: <strong id="itemCount">0</strong></div>
            <div class="stat">FPS: <strong id="fpsValue">0</strong></div>
        </div>
    </div>
    
    <!-- Status -->
    <div class="status" id="status">Loading AI models...</div>
    
    <!-- Debug -->
    <button id="toggleDebug">📋 LOG</button>
    <div id="debug"></div>
    
    <!-- Start Button -->
    <button id="startBtn">📷 START CAMERA</button>
    
    <!-- Video & Canvas -->
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <!-- Action Buttons -->
    <div class="actions">
        <button class="btn" id="btnDetect">🔍 Detect</button>
        <button class="btn" id="btnCapture">📷 Capture</button>
        <button class="btn" id="btnAnalyze">📊 Analyze</button>
        <button class="btn" id="btnScan">📱 Scan</button>
        <button class="btn" id="btnOCR">📝 Text</button>
    </div>
    
    <!-- Results Panel -->
    <div class="panel" id="resultsPanel">
        <div class="panel-header">
            <div style="font-weight: bold;">📊 Results</div>
            <button class="panel-close" id="btnClosePanel">&times;</button>
        </div>
        <div id="resultsContent">No results yet.</div>
    </div>

    <script>
        // === STATE ===
        let cameraActive = false;
        let cocoModel = null;
        let mobileModel = null;
        let lastDetections = [];
        let fps = 0;
        
        // === ELEMENTS ===
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const toggleDebug = document.getElementById('toggleDebug');
        const resultsPanel = document.getElementById('resultsPanel');
        const resultsContent = document.getElementById('resultsContent');
        
        // === BUTTONS (Guaranteed to work) ===
        toggleDebug.addEventListener('click', () => debug.classList.toggle('show'));
        document.getElementById('btnDetect').addEventListener('click', detect);
        document.getElementById('btnCapture').addEventListener('click', capture);
        document.getElementById('btnAnalyze').addEventListener('click', analyze);
        document.getElementById('btnScan').addEventListener('click', scan);
        document.getElementById('btnOCR').addEventListener('click', ocr);
        document.getElementById('btnClosePanel').addEventListener('click', () => resultsPanel.classList.remove('show'));
        
        // === LOGGING ===
        const log = (msg, type='') => {
            const color = type==='error' ? '#EF4444' : type==='success' ? '#10B981' : '#0F0';
            debug.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            debug.scrollTop = debug.scrollHeight;
            console.log('[OSAI]', msg);
        };
        
        log('=== OSAI v11.0 ===', 'success');
        log('Models: TF.js 4.10.0, COCO-SSD 2.2.3, MobileNet 2.1.1');
        log('Buttons: All bound with addEventListener');
        
        // === LOAD AI MODELS ===
        (async function loadModels() {
            try {
                log('Loading COCO-SSD...');
                cocoModel = await cocoSsd.load();
                log('✓ COCO-SSD ready', 'success');
                
                log('Loading MobileNet...');
                mobileModel = await mobilenet.load();
                log('✓ MobileNet ready', 'success');
                
                document.getElementById('aiModels').textContent = '2/2 ✓';
                document.getElementById('aiModels').style.color = '#10B981';
                status.textContent = '✓ AI Ready - 2 Models Loaded';
                status.style.background = 'rgba(16,185,129,0.9)';
                showToast('AI Models Loaded!', 'success');
                
            } catch (err) {
                log('Model error: ' + err.message, 'error');
                status.textContent = '⚠️ Basic mode (AI failed)';
                status.style.background = 'rgba(245,158,11,0.9)';
                document.getElementById('aiModels').textContent = 'Failed';
                document.getElementById('aiModels').style.color = '#EF4444';
            }
        })();
        
        // === CAMERA ===
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.textContent = 'STARTING...';
            log('Requesting camera...');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                
                log('✓ Permission granted', 'success');
                video.srcObject = stream;
                
                await new Promise((resolve, reject) => {
                    video.onloadedmetadata = () => {
                        log(`✓ Video: ${video.videoWidth}x${video.videoHeight}`, 'success');
                        resolve();
                    };
                    video.onerror = reject;
                    setTimeout(() => reject(new Error('Timeout')), 10000);
                });
                
                await video.play();
                log('✓ Video PLAYING', 'success');
                
                cameraActive = true;
                startBtn.style.display = 'none';
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                startDetectionLoop();
                startFPS();
                
                showToast('Camera Active!', 'success');
                
            } catch (err) {
                log('Camera error: ' + err.message, 'error');
                startBtn.disabled = false;
                startBtn.textContent = '📷 TRY AGAIN';
                showToast(err.message, 'error');
            }
        });
        
        // === DETECTION LOOP ===
        function startDetectionLoop() {
            const detect = async () => {
                if (!cameraActive) return;
                
                if (cocoModel) {
                    try {
                        const predictions = await cocoModel.detect(video);
                        lastDetections = predictions;
                        
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        predictions.forEach(pred => {
                            const [x, y, w, h] = pred.bbox;
                            ctx.strokeStyle = '#3B82F6';
                            ctx.lineWidth = 3;
                            ctx.strokeRect(x, y, w, h);
                            ctx.fillStyle = '#3B82F6';
                            ctx.font = '14px Arial';
                            ctx.fillText(`${pred.class} (${Math.round(pred.score * 100)}%)`, x, y - 5);
                        });
                        
                        document.getElementById('itemCount').textContent = predictions.length;
                        
                    } catch (err) {
                        log('Detection error: ' + err.message, 'error');
                    }
                }
                
                requestAnimationFrame(detect);
            };
            
            detect();
            log('Detection loop started', 'success');
        }
        
        // === FPS ===
        function startFPS() {
            let lastTime = performance.now();
            let frameCount = 0;
            
            const update = () => {
                const now = performance.now();
                frameCount++;
                
                if (now - lastTime >= 1000) {
                    fps = frameCount;
                    document.getElementById('fpsValue').textContent = fps;
                    frameCount = 0;
                    lastTime = now;
                }
                
                requestAnimationFrame(update);
            };
            
            update();
        }
        
        // === BUTTON HANDLERS ===
        function detect() {
            if (!cameraActive) { showToast('Start camera first!', 'warning'); return; }
            showToast('Detecting...', 'info');
            log('Detect clicked - ' + lastDetections.length + ' objects');
            if (lastDetections.length > 0) showResults(lastDetections);
        }
        
        function capture() {
            if (!cameraActive) { showToast('Start camera first!', 'warning'); return; }
            const link = document.createElement('a');
            link.download = `osai-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            showToast('Image captured!', 'success');
            log('Capture clicked');
        }
        
        function analyze() {
            if (!cameraActive) { showToast('Start camera first!', 'warning'); return; }
            showResults(lastDetections);
            log('Analyze clicked');
        }
        
        function scan() {
            if (!cameraActive) { showToast('Start camera first!', 'warning'); return; }
            showToast('Scan mode active', 'info');
            log('Scan clicked');
        }
        
        function ocr() {
            if (!cameraActive) { showToast('Start camera first!', 'warning'); return; }
            showToast('OCR mode active', 'info');
            log('OCR clicked');
        }
        
        // === RESULTS ===
        function showResults(detections) {
            if (!detections || detections.length === 0) {
                resultsContent.innerHTML = '<p>No objects detected.</p>';
            } else {
                let html = '<div style="display: grid; gap: 10px;">';
                detections.forEach((d, i) => {
                    html += `<div style="background: #1F2937; padding: 12px; border-radius: 8px; border-left: 3px solid #3B82F6;">
                        <div style="font-weight: bold; color: #3B82F6;">${d.class}</div>
                        <div style="font-size: 13px; color: #9CA3AF;">Confidence: ${Math.round(d.score * 100)}%</div>
                    </div>`;
                });
                html += '</div>';
                resultsContent.innerHTML = html;
            }
            resultsPanel.classList.add('show');
        }
        
        // === TOAST ===
        function showToast(msg, type='info') {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        log('Ready - tap START CAMERA', 'success');
        log('All buttons bound and ready');
    </script>
</body>
</html>
