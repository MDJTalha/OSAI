<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OSAI v3 - DEPLOYMENT TEST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#000;color:#fff}
#v{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;background:#000}
#b{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#3B82F6;color:#fff;border:none;border-radius:16px;padding:40px 80px;font-size:28px;font-weight:bold;cursor:pointer;z-index:9999}
#l{position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.95);color:#0F0;padding:15px;border-radius:8px;z-index:9999;font-size:13px;max-height:50vh;overflow-y:auto;font-family:monospace;display:none;border:2px solid #0F0}
#l.v{display:block}
#t{position:fixed;top:10px;right:10px;background:#EF4444;color:#fff;border:none;padding:10px 20px;border-radius:8px;z-index:10000;cursor:pointer;font-weight:bold}
#ver{position:fixed;bottom:10px;left:10px;background:rgba(59,130,246,0.9);padding:10px;border-radius:8px;z-index:9999;font-size:12px}
</style>
</head>
<body>
<button id="t">📋 SHOW LOG</button>
<div id="l"></div>
<div id="ver">DEPLOYED: <span id="timestamp"></span></div>
<button id="b">📷 START CAMERA</button>
<video id="v" autoplay playsinline muted></video>
<script>
document.getElementById('timestamp').textContent=new Date().toISOString();
const l=document.getElementById('l'),t=document.getElementById('t'),v=document.getElementById('v'),b=document.getElementById('b');
let logs=[];
const log=(m,c)=>{logs.push('<div style="color:'+(c||'#0F0')+'">['+new Date().toLocaleTimeString()+'] '+m+'</div>');l.innerHTML=logs.join('');console.log(m);};
t.onclick=()=>l.classList.toggle('v');
log('=== OSAI v3 DEPLOYMENT TEST ===','success');
log('Timestamp: '+new Date().toISOString(),'success');
log('URL: '+location.href,'warning');
b.onclick=async()=>{
  b.disabled=true;b.textContent='WAIT...';
  try{
    log('Requesting camera...');
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    log('✓ Stream obtained','success');
    v.srcObject=s;
    log('✓ Attached to video');
    await new Promise((ok,no)=>{
      v.onloadedmetadata=()=>{log('✓ Loaded '+v.videoWidth+'x'+v.videoHeight,'success');ok();};
      v.onerror=()=>no(new Error('Video error'));
      setTimeout(()=>no(new Error('Timeout')),10000);
    });
    v.style.display='block';v.style.visibility='visible';v.style.opacity='1';
    log('✓ Video CSS forced');
    await v.play();
    log('✓ VIDEO PLAYING!','success');
    b.style.display='none';
    log('=== SUCCESS - CAMERA WORKING ===','success');
    setInterval(()=>{log('Status: Playing | Size: '+v.videoWidth+'x'+v.videoHeight);},5000);
  }catch(e){
    log('ERROR: '+e.message,'error');
    b.disabled=false;b.textContent='📷 RETRY';
  }
};
log('Ready - tap START CAMERA');
</script>
</body>
</html>
