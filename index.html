<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSAI Camera Test</title>
    <link rel="stylesheet" href="force-video.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; }
        #video { width: 100vw; height: 100vh; object-fit: cover; background: #000; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px 60px; font-size: 24px; background: #3B82F6; color: white; border: none; border-radius: 12px; cursor: pointer; z-index: 9999; }
        #debug { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 9999; font-size: 13px; max-height: 50vh; overflow-y: auto; }
        .log { margin: 3px 0; }
        .error { color: #EF4444; }
        .success { color: #10B981; }
    </style>
</head>
<body>
    <div id="debug"><h3>🔍 DEBUG LOG</h3><div id="logs"></div></div>
    <button id="btn">📷 START CAMERA</button>
    <video id="video" autoplay playsinline muted></video>
    
    <script>
        const log = (m, t='') => {
            const d = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = 'log ' + t;
            div.textContent = '• ' + m;
            d.appendChild(div);
            console.log(m);
        };
        
        log('Page loaded', 'success');
        log('HTTPS: ' + (location.protocol === 'https:' ? 'YES' : 'NO'), location.protocol === 'https:' ? 'success' : 'error');
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            log('ERROR: Camera API not supported', 'error');
            document.getElementById('btn').disabled = true;
        } else {
            log('Camera API: Available', 'success');
            
            document.getElementById('btn').onclick = async () => {
                const btn = document.getElementById('btn');
                const video = document.getElementById('video');
                
                try {
                    log('Requesting camera...');
                    btn.textContent = 'Starting...';
                    btn.disabled = true;
                    
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    log('Permission GRANTED!', 'success');
                    
                    video.srcObject = stream;
                    log('Video stream attached', 'success');
                    
                    video.onloadedmetadata = () => {
                        log('Video loaded: ' + video.videoWidth + 'x' + video.videoHeight, 'success');
                        video.play();
                        log('Video PLAYING!', 'success');
                        btn.style.display = 'none';
                        log('✅ CAMERA WORKING!', 'success');
                    };
                    
                } catch (err) {
                    log('ERROR: ' + err.name + ' - ' + err.message, 'error');
                    btn.textContent = '📷 START CAMERA';
                    btn.disabled = false;
                }
            };
            
            log('Click START CAMERA button', 'success');
        }
    </script>
</body>
</html>
