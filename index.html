<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSAI - RAW CAMERA TEST</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background: #000; z-index: 1; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #3B82F6; color: white; border: none; border-radius: 16px; padding: 40px 80px; font-size: 28px; font-weight: bold; cursor: pointer; z-index: 9999; }
        #debug { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); color: #0F0; padding: 20px; z-index: 9999; font-size: 14px; overflow-y: auto; font-family: monospace; display: none; }
        #debug.show { display: block; }
        #toggle { position: fixed; top: 10px; right: 10px; background: #EF4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; z-index: 10000; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <button id="toggle">📋 SHOW LOG</button>
    <div id="debug"></div>
    <button id="btn">📷 START CAMERA</button>
    <video id="video" autoplay playsinline muted></video>
    
    <script>
        // NO ERROR HANDLING - RAW JAVASCRIPT
        const debug = document.getElementById('debug');
        const toggle = document.getElementById('toggle');
        const video = document.getElementById('video');
        const btn = document.getElementById('btn');
        
        let logs = [];
        const log = (msg, type='') => {
            const time = new Date().toLocaleTimeString();
            logs.push(`<div class="${type}">[${time}] ${msg}</div>`);
            debug.innerHTML = logs.join('');
            debug.scrollTop = debug.scrollHeight;
            console.log(msg);
        };
        
        toggle.onclick = () => debug.classList.toggle('show');
        
        log('=== RAW CAMERA TEST ===');
        log('Script loaded');
        log('HTTPS: ' + location.protocol);
        log('User Agent: ' + navigator.userAgent);
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            log('ERROR: Camera API missing', 'error');
            btn.disabled = true;
            btn.textContent = 'NOT SUPPORTED';
        } else {
            log('Camera API available');
            
            btn.onclick = async () => {
                log('Button clicked');
                btn.disabled = true;
                btn.textContent = 'REQUESTING...';
                
                try {
                    log('Requesting camera...');
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    log('Stream obtained', 'success');
                    
                    video.srcObject = stream;
                    log('Stream attached');
                    
                    video.onloadedmetadata = () => {
                        log('Metadata loaded', 'success');
                        log('Size: ' + video.videoWidth + 'x' + video.videoHeight);
                        
                        video.play().then(() => {
                            log('Video playing', 'success');
                            btn.style.display = 'none';
                            log('=== SUCCESS ===', 'success');
                        }).catch(err => log('Play error: ' + err.message, 'error'));
                    };
                    
                    video.onerror = () => log('Video element error', 'error');
                    
                } catch (err) {
                    log('ERROR: ' + err.name + ' - ' + err.message, 'error');
                    btn.disabled = false;
                    btn.textContent = 'TRY AGAIN';
                }
            };
            
            log('Ready - tap START CAMERA');
        }
    </script>
</body>
</html>
